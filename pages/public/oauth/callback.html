<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>OAuth callback &middot; lopecode.com</title>
<style>
  :root { color-scheme: light dark }
  body { font: 16px/1.55 system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding: 8vh 1.25rem; background: #fafafa; color: #111; text-align: center }
  @media (prefers-color-scheme: dark) { body { background: #0e0e10; color: #eaeaea } }
  main { max-width: 32rem; margin: 0 auto }
  p { opacity: 0.75 }
  code { font: 0.92em ui-monospace, SFMono-Regular, Menlo, monospace; background: rgba(127,127,127,0.12); padding: 1px 5px; border-radius: 3px }
</style>
</head>
<body>
<main>
  <h1>Signing you in&hellip;</h1>
  <p id="status">Relaying the authorization response back to the lopecode notebook that started this sign-in. You can close this tab.</p>
</main>
<script>
(function () {
  // atproto OAuth lands here with `code`, `state`, `iss` (success) or
  // `error`, `error_description`, `state` (failure). This page is a
  // stateless relay: forward the params to the notebook via two paths,
  // then close.
  //
  // 1. window.opener.postMessage — works when the popup chain preserved
  //    its opener. Severed by strict Cross-Origin-Opener-Policy on the
  //    auth server, which is common, so this is best-effort.
  // 2. BroadcastChannel("lopecode-oauth") — same-origin to a hidden
  //    `oauth/listener.html` iframe the notebook embeds. Survives COOP
  //    severance because it relies on origin scoping rather than the
  //    popup-opener relationship.
  //
  // The opener verifies origin / source / state nonce on receipt either
  // way; the auth code is PKCE+DPoP-bound and can't be redeemed without
  // the matching verifier and key, so duplicate delivery is harmless.
  var qs = new URLSearchParams(window.location.search);
  var params = {};
  qs.forEach(function (v, k) { params[k] = v; });
  var msg = { type: "lopecode-oauth-callback", params: params };

  var deliveredOpener = false;
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.postMessage(msg, "*");
      deliveredOpener = true;
    } catch (e) {}
  }

  var deliveredChannel = false;
  try {
    var ch = new BroadcastChannel("lopecode-oauth");
    ch.postMessage(msg);
    deliveredChannel = true;
    setTimeout(function () { try { ch.close(); } catch (e) {} }, 250);
  } catch (e) {}

  if (deliveredOpener || deliveredChannel) {
    setTimeout(function () { window.close(); }, 250);
  } else {
    var s = document.getElementById("status");
    if (params.error) {
      s.innerHTML = "Sign-in failed: <code>" + (params.error_description || params.error).replace(/[<>&"']/g, "") + "</code>";
    } else {
      s.textContent = "Lost the connection back to the lopecode notebook. Re-open the notebook and try again.";
    }
  }
})();
</script>
</body>
</html>
