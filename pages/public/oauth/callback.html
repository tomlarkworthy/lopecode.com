<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>OAuth callback &middot; lopecode.com</title>
<style>
  :root { color-scheme: light dark }
  body { font: 16px/1.55 system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding: 8vh 1.25rem; background: #fafafa; color: #111; text-align: center }
  @media (prefers-color-scheme: dark) { body { background: #0e0e10; color: #eaeaea } }
  main { max-width: 32rem; margin: 0 auto }
  p { opacity: 0.75 }
  code { font: 0.92em ui-monospace, SFMono-Regular, Menlo, monospace; background: rgba(127,127,127,0.12); padding: 1px 5px; border-radius: 3px }
</style>
</head>
<body>
<main>
  <h1>Signing you in&hellip;</h1>
  <p id="status">Relaying the authorization response back to the lopecode notebook that started this sign-in. You can close this tab.</p>
</main>
<script>
(function () {
  // atproto OAuth lands here with `code`, `state`, `iss` (success) or
  // `error`, `error_description`, `state` (failure). This page is a
  // stateless relay: route the params through the server-side relay so
  // the notebook (which may live on file:// or any other origin) can
  // poll for them. State is the 128-bit unguessable capability minted
  // by the notebook; the auth code itself is PKCE+DPoP-bound, so even
  // a leaked code can't be redeemed without the verifier/key.
  //
  // We also try `window.opener.postMessage` and a same-origin
  // `BroadcastChannel("lopecode-oauth")` as best-effort fast paths.
  // Both are unreliable in practice — strict Cross-Origin-Opener-Policy
  // on the auth server severs the opener, and Chrome's storage
  // partitioning isolates a third-party iframe's BroadcastChannel from
  // a top-level popup's. The server relay is the path that always works.
  var qs = new URLSearchParams(window.location.search);
  var params = {};
  qs.forEach(function (v, k) { params[k] = v; });
  var state = params.state;
  var msg = { type: "lopecode-oauth-callback", params: params };
  var statusEl = document.getElementById("status");

  // Best-effort fast paths.
  try {
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(msg, "*");
    }
  } catch (e) {}
  try {
    var ch = new BroadcastChannel("lopecode-oauth");
    ch.postMessage(msg);
    setTimeout(function () { try { ch.close(); } catch (e) {} }, 250);
  } catch (e) {}

  function showError(text) {
    statusEl.textContent = text;
  }

  if (!state || !/^[A-Za-z0-9_-]{16,128}$/.test(state)) {
    if (params.error) {
      showError("Sign-in failed: " + (params.error_description || params.error));
    } else {
      showError("OAuth callback missing state parameter — cannot relay safely.");
    }
    return;
  }

  // Authoritative path: POST the params to the server relay keyed by
  // state. The notebook polls GET /oauth/relay/<state> and consumes the
  // entry on first read.
  fetch("/oauth/relay/" + encodeURIComponent(state), {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(params),
    credentials: "omit",
    cache: "no-store"
  }).then(function (res) {
    if (!res.ok && res.status !== 204) {
      throw new Error("relay " + res.status);
    }
    setTimeout(function () { try { window.close(); } catch (e) {} }, 200);
  }).catch(function (err) {
    if (params.error) {
      showError("Sign-in failed: " + (params.error_description || params.error));
    } else {
      showError("Could not relay the result back to the notebook (" + err.message + "). Re-open the notebook and try again.");
    }
  });
})();
</script>
</body>
</html>
